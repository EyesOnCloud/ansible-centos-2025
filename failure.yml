---
-  name: Task Failure lab
  hosts: eoc-node1
  vars:
    web_package: httpd
    db_package: mariadb-server
    db_service: mariadb

  tasks:
    - name: Try installing web package, rollback to DB on failure
      block:
        - name: Install web package
          ansible.builtin.dnf:
            name: "{{ web_package }}"
            state: present

      rescue:
        - name: Install fallback database package
          ansible.builtin.dnf:
            name: "{{ db_package }}"
            state: present

      always:
        - name: Ensure database service is running
          ansible.builtin.service:
            name: "{{ db_service }}"
            state: started

vim ~/ansible/failure_conditions.yml

---
-name: Task Failure lab
  hosts: eoc-node1
  vars:
    web_package: httpd
    db_package: mariadb-server
    db_service: mariadb

  tasks:
    - name: check the local time
      ansible.builtin.command: date
      register: command_result

    - name: print local time
      ansible.builtin.debug:
        var: command_result.stdout

    - name: Attempt to setup a webserver
      block:
        - name: Install web package
          ansible.builtin.dnf:
            name: "{{ web_package }}"
            state: present
      rescue:
        - name: Install database package
          ansible.builtin.dnf:
            name: "{{ db_package }}"
            state: present
      always:
        - name: Ensure database service is running
          ansible.builtin.service:
            name: "{{ db_service }}"
            state: started
